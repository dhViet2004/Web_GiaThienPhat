name: Deploy to VPS

on:
  push:
    branches:
      - master # <--- SỬA 1: Đổi main thành master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/web_giathienphat

            # Tạo thư mục backup nếu chưa có
            mkdir -p mongo_backup

            # Backup MongoDB trước khi deploy (giữ 7 ngày gần nhất)
            docker-compose exec -T mongodb mongodump \
              --archive=/backup/backup_$(date +%Y%m%d_%H%M%S).archive.gz \
              --gzip \
              --quiet || echo "Backup failed, continuing..."

            # Dọn backup cũ hơn 7 ngày
            find mongo_backup -name "backup_*.archive.gz" -mtime +7 -delete

            # Pull code mới
            git pull origin master # <--- SỬA 2: Đổi main thành master

            # Tạo file .env nếu chưa có
            if [ ! -f .env ]; then
              cp .env.example .env 2>/dev/null || touch .env
            fi

            # Build và chạy lại containers
            docker-compose up -d --build

            # Chờ MongoDB sẵn sàng
            sleep 5

            # Seed admin mặc định nếu chưa có
            docker-compose exec -T nextjs node scripts/seed-admin.js || echo "Seed admin skipped"

            # Dọn image rác
            docker image prune -f