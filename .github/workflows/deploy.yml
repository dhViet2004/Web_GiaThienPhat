name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e # Lập tức dừng CI/CD nếu có lệnh nào bị lỗi
            cd /var/www/web_giathienphat

            # BƯỚC 1: Backup Database
            mkdir -p mongo_backup
            docker compose exec -T mongodb mongodump \
              --archive=/backup/backup_$(date +%Y%m%d_%H%M%S).archive.gz \
              --gzip \
              --quiet || echo "Backup failed, continuing..."
            find mongo_backup -name "backup_*.archive.gz" -mtime +7 -delete

            # BƯỚC 2: Cập nhật code mới
            git fetch --all
            git reset --hard origin/master
            git pull origin master

            if [ ! -f .env ]; then
              cp .env.example .env 2>/dev/null || touch .env
            fi

            # BƯỚC 3 & 4: Ép buộc Build Image và Tái tạo Container cùng lúc
            # Sử dụng --build để luôn build lại image
            # Sử dụng --force-recreate để đảm bảo container được tạo lại với image mới
            docker compose up -d --build --force-recreate nextjs

            # BƯỚC 5: Đợi hệ thống ổn định và chạy các script phụ trợ
            sleep 5
            docker compose exec -T nextjs node scripts/seed-admin.js || echo "Seed admin skipped"

            # BƯỚC 6: Dọn dẹp rác
            docker image prune -f