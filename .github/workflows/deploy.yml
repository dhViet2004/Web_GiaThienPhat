name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/web_giathienphat

            # BƯỚC 1: Backup Database
            mkdir -p mongo_backup
            docker compose exec -T mongodb mongodump \
              --archive=/backup/backup_$(date +%Y%m%d_%H%M%S).archive.gz \
              --gzip \
              --quiet || echo "Backup failed, continuing..."
            find mongo_backup -name "backup_*.archive.gz" -mtime +7 -delete

            # BƯỚC 2: Cập nhật code mới (Ép ghi đè để không bao giờ bị kẹt code cũ)
            git fetch --all
            git reset --hard origin/master
            git pull origin master

            if [ ! -f .env ]; then
              cp .env.example .env 2>/dev/null || touch .env
            fi

            # BƯỚC 3: Xóa cache và Build Image ngầm (Lúc này web cũ vẫn đang hoạt động phục vụ khách)
            docker compose build --no-cache nextjs

            # BƯỚC 4: Tráo đổi Container mới (Quá trình này diễn ra chớp nhoáng, hạn chế tối đa 502)
            docker compose up -d

            # BƯỚC 5: Đợi hệ thống ổn định và chạy các script phụ trợ
            sleep 5
            docker compose exec -T nextjs node scripts/seed-admin.js || echo "Seed admin skipped"

            # BƯỚC 6: Dọn dẹp rác (Xóa các image cũ để tránh đầy ổ cứng VPS)
            docker image prune -f