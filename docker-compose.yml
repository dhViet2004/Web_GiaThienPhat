
services:
  mongodb:
    image: mongo:latest
    container_name: gtp_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_gtp
    volumes:
      - gtp_mongodb_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: gtp_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secure_password_gtp
      ME_CONFIG_MONGODB_URL: mongodb://admin:secure_password_gtp@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      - mongodb

volumes:
  gtp_mongodb_data:
